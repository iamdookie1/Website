<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmojiVault — Discord Emojis & Stickers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e12;
    --bg2: #13151c;
    --bg3: #1a1d27;
    --card: #1e2130;
    --card-hover: #252840;
    --border: #2d3150;
    --accent: #5865f2;
    --accent2: #eb459e;
    --accent3: #57f287;
    --accent4: #fee75c;
    --text: #e8eaf6;
    --muted: #7b80a0;
    --nsfw: #ed4245;
    --tag: #2d3150;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Ambient glow */
  .ambient {
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(88,101,242,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .ambient2 {
    position: fixed;
    bottom: -200px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(235,69,158,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift2 15s ease-in-out infinite alternate;
  }
  @keyframes drift { to { transform: translate(100px, 80px); } }
  @keyframes drift2 { to { transform: translate(-80px, -60px); } }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,14,18,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .logo span { color: var(--accent); }

  .search-wrap {
    flex: 1;
    max-width: 520px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px 9px 40px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88,101,242,0.15);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
  }

  .header-right { display: flex; gap: 10px; margin-left: auto; }
  .nsfw-toggle {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.2s;
    user-select: none;
  }
  .nsfw-toggle.active {
    border-color: var(--nsfw);
    color: var(--nsfw);
    background: rgba(237,66,69,0.1);
  }
  .nsfw-toggle .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .nsfw-toggle.active .dot { background: var(--nsfw); }

  /* Main layout */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: 'Syne', sans-serif;
  }
  .tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px rgba(88,101,242,0.4);
  }
  .tab:hover:not(.active) { color: var(--text); background: var(--card); }

  /* Category pills */
  .categories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .cat-pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .cat-pill:hover { color: var(--text); border-color: var(--accent); }
  .cat-pill.active {
    background: rgba(88,101,242,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .stats-bar b { color: var(--text); }

  /* Grid */
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }
  .sticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  /* Cards */
  .emoji-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s both;
  }
  .emoji-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(88,101,242,0.05), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .emoji-card:hover { transform: translateY(-3px); border-color: var(--accent); background: var(--card-hover); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .emoji-card:hover::before { opacity: 1; }

  .emoji-card.nsfw-card { border-color: rgba(237,66,69,0.3); }
  .emoji-card.nsfw-card:hover { border-color: var(--nsfw); box-shadow: 0 8px 24px rgba(237,66,69,0.2); }

  .nsfw-badge {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--nsfw);
    color: white;
    font-size: 0.6rem;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .emoji-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    image-rendering: pixelated;
    transition: transform 0.2s;
  }
  .emoji-card:hover .emoji-img { transform: scale(1.15); }

  .emoji-name {
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-align: center;
    word-break: break-all;
    line-height: 1.3;
  }

  .emoji-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .e-tag {
    font-size: 0.6rem;
    background: var(--tag);
    color: var(--muted);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    width: 100%;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.2s;
  }
  .emoji-card:hover .card-actions { opacity: 1; transform: translateY(0); }

  .action-btn {
    flex: 1;
    padding: 5px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    transition: all 0.15s;
    text-align: center;
  }
  .action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .action-btn.dl:hover { background: var(--accent3); border-color: var(--accent3); color: #000; }

  /* Sticker card */
  .sticker-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s both;
  }
  .sticker-card:hover { transform: translateY(-4px); border-color: var(--accent2); background: var(--card-hover); box-shadow: 0 10px 30px rgba(235,69,158,0.15); }

  .sticker-img {
    width: 100px; height: 100px;
    object-fit: contain;
    transition: transform 0.3s;
  }
  .sticker-card:hover .sticker-img { transform: scale(1.1) rotate(-3deg); }

  .sticker-info { width: 100%; }
  .sticker-name {
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sticker-pack {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .sticker-format {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
  }
  .fmt-png { background: rgba(88,101,242,0.2); color: var(--accent); }
  .fmt-gif { background: rgba(87,242,135,0.2); color: var(--accent3); }
  .fmt-apng { background: rgba(254,231,92,0.2); color: var(--accent4); }
  .fmt-lottie { background: rgba(235,69,158,0.2); color: var(--accent2); }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .big { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 9000;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent3); color: var(--accent3); }
  .toast.info { border-color: var(--accent); color: var(--accent); }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 400px;
    width: 90%;
    transform: scale(0.9);
    transition: transform 0.2s;
    position: relative;
  }
  .modal-backdrop.open .modal { transform: scale(1); }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--text); }
  .modal-img {
    display: flex; justify-content: center;
    margin-bottom: 16px;
  }
  .modal-img img { width: 120px; height: 120px; object-fit: contain; image-rendering: pixelated; }
  .modal-name {
    font-size: 1.2rem;
    font-weight: 800;
    margin-bottom: 6px;
    text-align: center;
  }
  .modal-meta {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
  }
  .modal-code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .modal-code:hover { border-color: var(--accent); background: rgba(88,101,242,0.1); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 10px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--accent); color: white; }
  .modal-btn.primary:hover { background: #4752c4; box-shadow: 0 4px 12px rgba(88,101,242,0.4); }
  .modal-btn.secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .modal-btn.secondary:hover { border-color: var(--accent3); color: var(--accent3); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 2rem;
  }
  .page-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  @media (max-width: 640px) {
    .header-inner { gap: 1rem; }
    .logo-text { display: none; }
    .container { padding: 1rem; }
    .emoji-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="ambient2"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Emoji<span>Vault</span></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search emojis, stickers...">
    </div>
    <div class="header-right">
      <div class="nsfw-toggle" id="nsfwToggle" onclick="toggleNSFW()">
        <div class="dot"></div>
        NSFW
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('emojis', this)">😄 Emojis</button>
    <button class="tab" onclick="switchTab('stickers', this)">🎨 Stickers</button>
    <button class="tab" onclick="switchTab('twemoji', this)">🐦 Twemoji</button>
  </div>

  <div class="categories" id="categoryBar"></div>

  <div class="stats-bar" id="statsBar">
    <span>Loading...</span>
  </div>

  <div id="gridContainer"></div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img"><img id="modalImg" src="" alt=""></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-code" id="modalCode" onclick="copyCode()"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" id="modalDlBtn">⬇ Download</button>
      <button class="modal-btn secondary" onclick="copyCode()">📋 Copy Code</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  tab: 'emojis',
  category: 'all',
  search: '',
  nsfw: false,
  page: 1,
  perPage: 80,
  items: [],
  filtered: [],
};

// ─── Data Sources ─────────────────────────────────────────────────────────────

// Emoji categories from Unicode/Discord

const STICKER_CATS = [

const TWEMOJI_CATS = [

  { id: 'smileys', label: '😄 Smileys' },

  { id: 'nature', label: '🌿 Nature' },

  { id: 'nsfw', label: '🔞 NSFW' },

// Large emoji dataset using Twemoji CDN (72x72 PNG)
const TWEMOJI_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/';

// Emoji data: [codepoint, name, category, tags, nsfw?]
const RAW_EMOJIS = [
  // FACES
  ['1f600','grinning','faces',['happy','smile'],false],
  ['1f601','grin','faces',['big smile'],false],
  ['1f602','joy','faces',['tears','laugh'],false],
  ['1f603','smiley','faces',['smile'],false],
  ['1f604','smile','faces',['eyes','happy'],false],
  ['1f605','sweat_smile','faces',['nervous'],false],
  ['1f606','laughing','faces',['lol'],false],
  ['1f607','innocent','faces',['halo','angel'],false],
  ['1f608','smiling_imp','faces',['devil','evil'],false],
  ['1f609','wink','faces',['wink'],false],
  ['1f60a','blush','faces',['blush','cute'],false],
  ['1f60b','yum','faces',['food','lick'],false],
  ['1f60c','relieved','faces',['calm'],false],
  ['1f60d','heart_eyes','faces',['love'],false],
  ['1f60e','sunglasses','faces',['cool'],false],
  ['1f60f','smirk','faces',['smirk'],false],
  ['1f610','neutral_face','faces',['neutral'],false],
  ['1f611','expressionless','faces',['blank'],false],

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  buildCategories();
  loadItems();
  document.getElementById('searchInput').addEventListener('input', debounce(handleSearch, 250));
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ─── Tab Switching ─────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  state.tab = tab;
  state.category = 'all';
  state.page = 1;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  buildCategories();
  loadItems();
}

// ─── Categories ──────────────────────────────────────────────────────────────
function buildCategories() {
  const bar = document.getElementById('categoryBar');
  const cats = state.tab === 'emojis' ? EMOJI_CATS : state.tab === 'stickers' ? STICKER_CATS : TWEMOJI_CATS;
  bar.innerHTML = cats.map(c => {
    // Hide NSFW category unless NSFW is enabled
    if (c.id === 'nsfw' && !state.nsfw) return '';
    return `<div class="cat-pill ${state.category === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">${c.label}</div>`;
  }).join('');
}

function setCategory(cat) {
  state.category = cat;
  state.page = 1;
  buildCategories();
  loadItems();
}

// ─── NSFW Toggle ─────────────────────────────────────────────────────────────
function toggleNSFW() {
  state.nsfw = !state.nsfw;
  const t = document.getElementById('nsfwToggle');
  t.classList.toggle('active', state.nsfw);
  if (!state.nsfw && state.category === 'nsfw') { state.category = 'all'; }
  buildCategories();
  loadItems();
}

// ─── Search ───────────────────────────────────────────────────────────────────
function handleSearch() {
  state.search = document.getElementById('searchInput').value.toLowerCase().trim();
  state.page = 1;
  loadItems();
}

// ─── Load & Filter ───────────────────────────────────────────────────────────
function loadItems() {
  showLoading();
  setTimeout(() => {
    let src = state.tab === 'emojis' ? RAW_EMOJIS : state.tab === 'stickers' ? STICKERS : TWEMOJI_DATA;
    let filtered;

    if (state.tab === 'emojis' || state.tab === 'twemoji') {
      const data = state.tab === 'emojis' ? RAW_EMOJIS : TWEMOJI_DATA;
      filtered = data.filter(e => {
        const nsfw = e[4];
        if (nsfw && !state.nsfw) return false;
        if (state.category !== 'all') {
          if (state.category === 'nsfw' && !nsfw) return false;
          if (state.category !== 'nsfw' && e[2] !== state.category) return false;
        }
        if (state.search) {
          return e[1].includes(state.search) || e[3].some(t => t.includes(state.search));
        }
        return true;
      });
      // Deduplicate by codepoint
      const seen = new Set();
      filtered = filtered.filter(e => { if (seen.has(e[0])) return false; seen.add(e[0]); return true; });
    } else {
      filtered = STICKERS.filter(s => {
        if (s.nsfw && !state.nsfw) return false;
        if (state.category !== 'all') {
          if (state.category === 'nsfw' && !s.nsfw) return false;
          if (state.category !== 'nsfw' && s.cat !== state.category) return false;
        }
        if (state.search) return s.name.toLowerCase().includes(state.search) || s.pack.toLowerCase().includes(state.search);
        return true;
      });
    }

    state.filtered = filtered;
    renderGrid();
    renderStats(filtered.length);
    renderPagination(filtered.length);
  }, 180);
}

function showLoading() {
  document.getElementById('gridContainer').innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading...</span></div>`;
  document.getElementById('pagination').innerHTML = '';
  document.getElementById('statsBar').innerHTML = '<span>Loading...</span>';
}

// ─── Render Grid ─────────────────────────────────────────────────────────────
function renderGrid() {
  const start = (state.page - 1) * state.perPage;
  const items = state.filtered.slice(start, start + state.perPage);
  const container = document.getElementById('gridContainer');

  if (items.length === 0) {
    container.innerHTML = `<div class="empty"><div class="big">🔍</div><p>No results found. Try a different search or category.</p></div>`;
    return;
  }

  if (state.tab === 'stickers') {
    container.className = 'sticker-grid';
    container.innerHTML = items.map((s, i) => renderStickerCard(s, i)).join('');
  } else {
    container.className = 'emoji-grid';
    container.innerHTML = items.map((e, i) => renderEmojiCard(e, i)).join('');
  }
}

function getEmojiUrl(codepoint) {
  return `${TWEMOJI_BASE}${codepoint}.png`;
}

function renderEmojiCard(e, idx) {
  const [cp, name, cat, tags, nsfw] = e;
  const url = getEmojiUrl(cp);
  const delay = (idx % state.perPage) * 20;
  return `
    <div class="emoji-card ${nsfw ? 'nsfw-card' : ''}" style="animation-delay:${delay}ms" onclick="openModal('${cp}','${name}','${cat}','${encodeURIComponent(tags.join(','))}',${nsfw})">
      ${nsfw ? '<div class="nsfw-badge">NSFW</div>' : ''}
      <img class="emoji-img" src="${url}" alt="${name}" loading="lazy" onerror="this.style.fontSize='2.5rem';this.outerHTML='<span style=font-size:2.5rem>${getEmojiChar(cp)}</span>'">
      <div class="emoji-name">:${name}:</div>
      <div class="emoji-tags">${tags.slice(0,2).map(t=>`<span class="e-tag">${t}</span>`).join('')}</div>
      <div class="card-actions">
        <div class="action-btn" onclick="event.stopPropagation();copyName(':${name}:')">Copy</div>
        <div class="action-btn dl" onclick="event.stopPropagation();downloadEmoji('${url}','${name}')">⬇</div>
      </div>
    </div>`;
}

function renderStickerCard(s, idx) {
  const delay = (idx % state.perPage) * 25;
  const fmtClass = `fmt-${s.format}`;
  // Generate a placeholder sticker visual using emoji + gradient
  const bg = `linear-gradient(135deg, ${s.color}22, ${s.color}44)`;
  return `
    <div class="sticker-card" style="animation-delay:${delay}ms" onclick="openStickerModal(${s.id})">
      ${s.nsfw ? '<div class="nsfw-badge">NSFW</div>' : ''}
      <div style="width:100px;height:100px;display:flex;align-items:center;justify-content:center;background:${bg};border-radius:12px;font-size:3.5rem;transition:transform 0.3s" class="sticker-img">${s.emoji}</div>
      <div class="sticker-info">
        <div class="sticker-name">${s.name}</div>
        <div class="sticker-pack">${s.pack}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="sticker-format ${fmtClass}">.${s.format.toUpperCase()}</span>
      </div>
      <div class="card-actions">
        <div class="action-btn" onclick="event.stopPropagation();copyName('${s.name}')">Copy Name</div>
        <div class="action-btn dl" onclick="event.stopPropagation();downloadSticker(${s.id})">⬇ DL</div>
      </div>
    </div>`;
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function renderStats(total) {
  const type = state.tab === 'stickers' ? 'stickers' : 'emojis';
  document.getElementById('statsBar').innerHTML = `
    <span><b>${total.toLocaleString()}</b> ${type} found</span>
    <span>Page <b>${state.page}</b> of <b>${Math.max(1, Math.ceil(total/state.perPage))}</b></span>
    ${state.nsfw ? `<span style="color:var(--nsfw)">● NSFW Enabled</span>` : ''}
  `;
}

// ─── Pagination ───────────────────────────────────────────────────────────────
function renderPagination(total) {
  const pages = Math.ceil(total / state.perPage);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  if (state.page > 1) html += `<button class="page-btn" onclick="goPage(${state.page-1})">‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - state.page) <= 2) {
      html += `<button class="page-btn ${i === state.page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - state.page) === 3) {
      html += `<span style="color:var(--muted);align-self:center;padding:0 4px">…</span>`;
    }
  }
  if (state.page < pages) html += `<button class="page-btn" onclick="goPage(${state.page+1})">›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  state.page = p;
  renderGrid();
  renderStats(state.filtered.length);
  renderPagination(state.filtered.length);
  window.scrollTo({top: 0, behavior:'smooth'});
}

// ─── Modal ────────────────────────────────────────────────────────────────────
let currentModalData = null;

function openModal(cp, name, cat, tagsEnc, nsfw) {
  const url = getEmojiUrl(cp);
  const code = `:${name}:`;
  document.getElementById('modalImg').src = url;
  document.getElementById('modalName').textContent = `:${name}:`;
  document.getElementById('modalMeta').textContent = `Category: ${cat} • ${nsfw ? '🔞 NSFW' : 'SFW'} • Unicode: U+${cp.toUpperCase()}`;
  document.getElementById('modalCode').textContent = code;
  document.getElementById('modalDlBtn').onclick = () => downloadEmoji(url, name);
  currentModalData = { url, name, type: 'emoji' };
  document.getElementById('modalBackdrop').classList.add('open');
}

function openStickerModal(id) {
  const s = STICKERS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalImg').style.fontSize = '5rem';
  document.getElementById('modalImg').outerHTML = `<div id="modalImg" style="font-size:4rem;width:120px;height:120px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,${s.color}22,${s.color}44);border-radius:16px">${s.emoji}</div>`;
  document.getElementById('modalName').textContent = s.name;
  document.getElementById('modalMeta').textContent = `Pack: ${s.pack} • Format: .${s.format.toUpperCase()} • ${s.nsfw ? '🔞 NSFW' : 'SFW'}`;
  document.getElementById('modalCode').textContent = s.name;
  document.getElementById('modalDlBtn').onclick = () => { downloadSticker(id); };
  currentModalData = { name: s.name, type: 'sticker' };
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalBackdrop')) return;
  document.getElementById('modalBackdrop').classList.remove('open');
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function copyCode() {
  const code = document.getElementById('modalCode').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('📋 Copied to clipboard!', 'success'));
}

function copyName(name) {
  navigator.clipboard.writeText(name).then(() => showToast(`📋 Copied: ${name}`, 'success'));
}

function downloadEmoji(url, name) {
  showToast(`⬇ Downloading ${name}.png...`, 'info');
  fetch(url)
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${name}.png`;
      a.click();
      showToast(`✅ Downloaded ${name}.png`, 'success');
    })
    .catch(() => {
      // Fallback: open in new tab
      window.open(url, '_blank');
      showToast(`✅ Opened ${name} in new tab`, 'info');
    });
}

function downloadSticker(id) {
  const s = STICKERS.find(x => x.id === id);
  if (!s) return;
  showToast(`⬇ Downloading ${s.name}.${s.format}...`, 'info');
  // For demo, create a canvas PNG with the emoji
  const canvas = document.createElement('canvas');
  canvas.width = 320; canvas.height = 320;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = s.color + '33';
  ctx.roundRect(0, 0, 320, 320, 32);
  ctx.fill();
  // Emoji
  ctx.font = '180px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(s.emoji, 160, 170);
  // Name
  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(s.name, 160, 295);

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${s.name.replace(/\s+/g,'_')}.png`;
    a.click();
    setTimeout(() => showToast(`✅ Downloaded ${s.name}`, 'success'), 500);
  });
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getEmojiChar(cp) {
  try {
    const parts = cp.split('-');
    return String.fromCodePoint(...parts.map(p => parseInt(p, 16)));
  } catch { return '❓'; }
}

// ─── Start ────────────────────────────────────────────────────────────────────
init();
